<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maha Collection - Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --wine: #8B1A4A;
  --rose: #C9536A;
  --gold: #D4A853;
  --cream: #FDF6F0;
  --dark: #1a0a10;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Nunito', sans-serif;
  --shadow: 0 8px 32px rgba(139,26,74,0.15);
  --radius: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--cream); color: var(--dark); overflow-x: hidden; }
img { max-width: 100%; display: block; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: var(--sans); }

/* ===== LOGIN SCREEN ===== */
.login-wrap {
  display: flex;
  width: 100vw;
  height: 100vh;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, rgba(139,26,74,0.15) 0%, rgba(201,83,106,0.08) 100%);
}
.login-box {
  background: #fff;
  padding: 48px;
  border-radius: var(--radius);
  box-shadow: 0 12px 48px rgba(139,26,74,0.12);
  max-width: 420px;
  width: 100%;
}
.login-logo {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 32px;
  color: var(--wine);
}
.login-logo span { color: var(--rose); font-style: italic; }
.login-title {
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 28px;
  color: var(--dark);
}
.login-field {
  display: flex;
  flex-direction: column;
  margin-bottom: 20px;
}
.login-label {
  font-size: 13px;
  font-weight: 600;
  color: #555;
  margin-bottom: 8px;
}
.login-input {
  padding: 12px 14px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--sans);
  transition: border-color 0.2s;
}
.login-input:focus {
  outline: none;
  border-color: var(--wine);
  box-shadow: 0 0 0 3px rgba(139,26,74,0.1);
}
.login-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--wine), var(--rose));
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 8px;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(139,26,74,0.3); }
.login-error {
  background: #fee;
  border: 1px solid #fcc;
  color: #c33;
  padding: 12px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

/* ===== ADMIN DASHBOARD ===== */
.admin-wrap {
  display: flex;
  min-height: 100vh;
  gap: 0;
}
.admin-sidebar {
  width: 240px;
  background: var(--dark);
  padding: 28px 0;
  border-right: 1px solid rgba(139,26,74,0.2);
  position: fixed;
  height: 100vh;
  overflow-y: auto;
}
.admin-main {
  margin-left: 240px;
  flex: 1;
  padding: 28px;
}
.sidebar-logo {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  padding: 0 20px;
  margin-bottom: 32px;
}
.sidebar-logo span { color: var(--gold); font-style: italic; }
.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.sidebar-btn {
  padding: 12px 20px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  text-align: left;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}
.sidebar-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
.sidebar-btn.active { color: var(--gold); border-left-color: var(--gold); background: rgba(139,26,74,0.15); }

/* ===== ADMIN CONTENT ===== */
.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}
.admin-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  color: var(--dark);
}
.admin-user { font-size: 13px; color: #888; }
.a-section {
  background: #fff;
  padding: 28px;
  border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(139,26,74,0.06);
  margin-bottom: 24px;
}
.a-section-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--dark);
}
.a-field {
  display: flex;
  flex-direction: column;
  margin-bottom: 16px;
}
.a-label {
  font-size: 12px;
  font-weight: 600;
  color: #555;
  margin-bottom: 6px;
}
.a-input {
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 13px;
  font-family: var(--sans);
  transition: border-color 0.2s;
}
.a-input:focus {
  outline: none;
  border-color: var(--wine);
  box-shadow: 0 0 0 2px rgba(139,26,74,0.1);
}
.a-input.sm { font-size: 12px; padding: 8px 10px; }
.a-input select { background-color: #fff; }
.a-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.a-btn {
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.a-btn-primary {
  background: linear-gradient(135deg, var(--wine), var(--rose));
  color: #fff;
}
.a-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139,26,74,0.2); }
.a-btn-danger {
  background: #fee;
  color: #c33;
  border: 1px solid #fcc;
}
.a-btn-danger:hover { background: #fdd; }
.a-save-bar {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid #eee;
}
.a-success-msg {
  font-size: 12px;
  color: #22aa33;
  opacity: 0;
  transition: opacity 0.3s;
}
.a-success-msg.show { opacity: 1; }

/* ===== PRODUCTS TAB ===== */
.prod-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.prod-table th {
  text-align: left;
  padding: 12px;
  background: rgba(139,26,74,0.05);
  font-weight: 600;
  color: var(--dark);
  border-bottom: 2px solid #ddd;
}
.prod-table td {
  padding: 12px;
  border-bottom: 1px solid #eee;
}
.prod-action { display: flex; gap: 8px; }
.prod-edit-btn {
  padding: 6px 12px;
  background: var(--gold);
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  transition: all 0.2s;
}
.prod-edit-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(212,168,83,0.3); }
.prod-del-btn {
  padding: 6px 12px;
  background: #fee;
  color: #c33;
  border: 1px solid #fcc;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  transition: all 0.2s;
}
.prod-del-btn:hover { background: #fdd; }

/* ===== MODAL ===== */
.modal-wrap {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 10000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-wrap.active { display: flex; }
.modal-box {
  background: #fff;
  border-radius: var(--radius);
  max-width: 900px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 0;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 28px;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  background: #fff;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
}
.modal-close {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: #888;
  transition: color 0.2s;
}
.modal-close:hover { color: var(--dark); }
.modal-content {
  padding: 28px;
}
.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  padding: 20px 28px;
  border-top: 1px solid #eee;
  background: #fafafa;
}

/* ===== IMAGE UPLOAD ===== */
.img-upload-row {
  display: flex;
  gap: 8px;
}
.img-upload-btn {
  padding: 10px 16px;
  background: var(--gold);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.img-upload-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(212,168,83,0.3); }

/* ===== RESPONSIVE ===== */
@media(max-width: 1024px) {
  .admin-sidebar { width: 200px; }
  .admin-main { margin-left: 200px; }
  .a-grid-2 { grid-template-columns: 1fr; }
}

@media(max-width: 768px) {
  .admin-sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #ddd; }
  .admin-main { margin-left: 0; padding: 16px; }
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo"><span>Maha</span> Admin</div>
    <div class="login-title">🔐 Admin Login</div>
    <div class="login-error" id="loginError"></div>
    <div class="login-field">
      <label class="login-label">Password</label>
      <input type="password" id="loginPw" class="login-input" placeholder="Admin password" onkeypress="if(event.key==='Enter') adminLogin()"/>
    </div>
    <button class="login-btn" onclick="adminLogin()">Login Karo</button>
  </div>
</div>

<!-- ===== ADMIN DASHBOARD ===== -->
<div class="admin-wrap" id="adminWrap" style="display:none">
  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo"><span>Maha</span> Admin</div>
    <nav class="sidebar-nav">
      <button class="sidebar-btn active" onclick="switchTab('products')">📦 Products</button>
      <button class="sidebar-btn" onclick="switchTab('categories')">🏷️ Categories</button>
      <button class="sidebar-btn" onclick="switchTab('website')">🌐 Website</button>
      <button class="sidebar-btn" onclick="switchTab('social')">📱 Social Links</button>
      <button class="sidebar-btn" onclick="switchTab('hero')">🎥 Hero & Stats</button>
      <button class="sidebar-btn" onclick="switchTab('security')">🔐 Security</button>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="admin-main">
    <div class="admin-header">
      <h1 class="admin-title">Maha Collection</h1>
      <div>
        <div class="admin-user">👤 Admin</div>
      </div>
    </div>
    <div id="adminContent"></div>
  </main>
</div>

<!-- ===== EDIT PRODUCT MODAL ===== -->
<div class="modal-wrap" id="productModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Edit Product</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-content" id="productModalContent"></div>
    <div class="modal-footer">
      <button class="a-btn a-btn-primary" onclick="adminSaveAll()">💾 Save Karo</button>
      <button class="a-btn" style="background:#e0e0e0" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
/* ========== CONFIG ========== */
const CONFIG = {
  adminPassword: 'maha123',
  brandName: 'Maha Collection',
  tagline: 'Where Every Piece Tells a Story',
  whatsappNumber: '923334445566',
  heroTitle1: 'MAHA',
  heroTitle2: 'COLLECTION',
  heroSub: 'Premium Pakistani fashion — lawn suits, bridal wear, jewellery & more.\nOrder directly on WhatsApp for fastest delivery.',
  trustPills: ['✓ 10,000+ Happy Customers', '✓ Same Day WhatsApp Reply', '✓ 4.9★ Average Rating'],
  stat1n: '10,000+',
  stat1l: 'Happy Customers',
  stat2n: '500+',
  stat2l: 'Products',
  stat3n: '4.9★',
  stat3l: 'Average Rating',
  stat4n: 'Same Day',
  stat4l: 'WhatsApp Reply',
  heroBanner: 'https://images.pexels.com/photos/1055691/pexels-photo-1055691.jpeg',
  instagram: 'https://instagram.com',
  facebook: 'https://facebook.com',
  tiktok: 'https://tiktok.com'
};

let adminAuthed = false;
let adminItems = [];
let adminCfg = { ...CONFIG };
let CATEGORIES = ['Lawn', 'Bridal', 'Dupatta', 'Formal', 'Jewelry', 'Saree'];

/* ========== PRODUCTS DATA ========== */
let PRODUCTS = [
  { id: 1, name: 'Elegant Lawn Suit', cat: 'Lawn', price: 'Rs 2,500', img: 'https://images.pexels.com/photos/2559827/pexels-photo-2559827.jpeg', desc: 'Comfortable cotton lawn in vibrant colors' },
  { id: 2, name: 'Bridal Lehenga', cat: 'Bridal', price: 'Rs 15,000', img: 'https://images.pexels.com/photos/1536620/pexels-photo-1536620.jpeg', desc: 'Gorgeous embroidered bridal collection' },
  { id: 3, name: 'Silk Dupatta', cat: 'Dupatta', price: 'Rs 1,800', img: 'https://images.pexels.com/photos/5068828/pexels-photo-5068828.jpeg', desc: 'Premium silk with hand embroidery' },
  { id: 4, name: 'Formal Kameez', cat: 'Formal', price: 'Rs 3,200', img: 'https://images.pexels.com/photos/1536620/pexels-photo-1536620.jpeg', desc: 'Perfect for offices and formal events' },
  { id: 5, name: 'Gold Bangles Set', cat: 'Jewelry', price: 'Rs 8,500', img: 'https://images.pexels.com/photos/1578500/pexels-photo-1578500.jpeg', desc: 'Stunning traditional gold bangles' },
  { id: 6, name: 'Designer Saree', cat: 'Saree', price: 'Rs 5,500', img: 'https://images.pexels.com/photos/2055691/pexels-photo-2055691.jpeg', desc: 'Modern design with traditional touch' }
];

/* ========== LOGIN ========== */
function adminLogin() {
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginError');
  if(!pw) { err.textContent = 'Password likho!'; err.style.display = 'block'; return; }
  if(pw !== CONFIG.adminPassword) { err.textContent = 'Password galat hai!'; err.style.display = 'block'; return; }
  adminAuthed = true;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'flex';
  adminItems = [...PRODUCTS];
  switchTab('products');
}

/* ========== TAB SWITCHING ========== */
function switchTab(tab) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  let html = '';
  if(tab === 'products') html = renderProductsTab();
  else if(tab === 'categories') html = renderCategoriesTab();
  else if(tab === 'website') html = renderWebsiteTab();
  else if(tab === 'social') html = renderSocialTab();
  else if(tab === 'hero') html = renderHeroTab();
  else if(tab === 'security') html = renderSecurityTab();
  
  document.getElementById('adminContent').innerHTML = html;
}

/* ── PRODUCTS TAB ── */
function renderProductsTab() {
  return `
    <div class="a-section">
      <div class="a-section-title">📦 Products Management</div>
      <table class="prod-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${adminItems.map((p,i) => `
            <tr>
              <td>${p.name}</td>
              <td>${p.cat}</td>
              <td>${p.price}</td>
              <td class="prod-action">
                <button class="prod-edit-btn" onclick="editProduct(${i})">✏️ Edit</button>
                <button class="prod-del-btn" onclick="deleteProduct(${i})">🗑️ Delete</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div style="margin-top:20px">
        <button class="a-btn a-btn-primary" onclick="addProduct()">➕ Add Product</button>
      </div>
    </div>`;
}

/* ── CATEGORIES TAB ── */
function renderCategoriesTab() {
  return `
    <div class="a-section">
      <div class="a-section-title">🏷️ Category Management</div>
      <p style="font-size:12px;color:#888;margin-bottom:16px">Apne categories ko manage karein. Ye categories products add karte waqat dropdown menu ma dikhayi denge.</p>
      <div id="categoriesList" style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px">
        ${CATEGORIES.map((cat, i) => `
          <div style="background:rgba(139,26,74,0.08);padding:10px 16px;border-radius:20px;display:flex;align-items:center;gap:12px;border:1px solid rgba(139,26,74,0.15)">
            <span style="font-weight:600;color:var(--wine)">${cat}</span>
            <button class="prod-del-btn" style="padding:4px 8px;font-size:11px" onclick="deleteCategory(${i})">✕ Remove</button>
          </div>
        `).join('')}
      </div>
      <div class="a-field">
        <label class="a-label">Naya Category Add Karo</label>
        <div style="display:flex;gap:8px">
          <input class="a-input" id="newCatInput" placeholder="Category ka naam likho" style="flex:1"/>
          <button class="a-btn a-btn-primary" style="white-space:nowrap" onclick="addNewCategory()">➕ Add</button>
        </div>
      </div>
      <span class="a-success-msg" id="catMsg" style="display:block;margin-top:12px">✔ Category added!</span>
    </div>`;
}

function addNewCategory() {
  const input = document.getElementById('newCatInput');
  const catName = input.value.trim();
  if(!catName) { alert('Category ka naam likho!'); return; }
  if(CATEGORIES.includes(catName)) { alert('Ye category pehle se hai!'); return; }
  CATEGORIES.push(catName);
  document.getElementById('adminContent').innerHTML = renderCategoriesTab();
  const msg = document.getElementById('catMsg');
  if(msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500); }
}

function deleteCategory(i) {
  if(CATEGORIES.length <= 1) { alert('Kam se kam ek category honi chahiye!'); return; }
  if(confirm(`Kya "${CATEGORIES[i]}" category delete karna hai?`)) {
    CATEGORIES.splice(i, 1);
    document.getElementById('adminContent').innerHTML = renderCategoriesTab();
  }
}

function editProduct(i) {
  const p = adminItems[i];
  const catOptions = CATEGORIES.map(cat => `<option value="${cat}" ${p.cat === cat ? 'selected' : ''}>${cat}</option>`).join('');
  document.getElementById('productModalContent').innerHTML = `
    <div class="a-field">
      <label class="a-label">Product Name</label>
      <input class="a-input" value="${p.name}" oninput="adminItems[${i}].name=this.value"/>
    </div>
    <div class="a-grid-2">
      <div class="a-field">
        <label class="a-label">Category</label>
        <select class="a-input" onchange="adminItems[${i}].cat=this.value" style="cursor:pointer;appearance:auto">
          <option value="">-- Select Category --</option>
          ${catOptions}
        </select>
      </div>
      <div class="a-field">
        <label class="a-label">Price</label>
        <input class="a-input" value="${p.price}" oninput="adminItems[${i}].price=this.value"/>
      </div>
    </div>
    <div class="a-field">
      <label class="a-label">Description</label>
      <input class="a-input" value="${p.desc}" oninput="adminItems[${i}].desc=this.value"/>
    </div>
    <div class="a-field">
      <label class="a-label">Image URL</label>
      <div class="img-upload-row">
        <input class="a-input" value="${p.img}" oninput="adminItems[${i}].img=this.value;document.getElementById('imgPreview').src=this.value"/>
        <button class="img-upload-btn" onclick="document.getElementById('imgFile${i}').click()">📷 Upload</button>
        <input type="file" id="imgFile${i}" accept="image/*" style="display:none" onchange="handleImageFile(this,${i})"/>
      </div>
      <img id="imgPreview" src="${p.img}" style="margin-top:12px;max-height:120px;border-radius:8px;border:1px solid #ddd" onerror="this.style.display='none'"/>
    </div>
  `;
  document.getElementById('productModal').classList.add('active');
}

function addProduct() {
  const newId = Math.max(...adminItems.map(p => p.id), 0) + 1;
  adminItems.push({ id: newId, name: 'New Product', cat: 'New', price: 'Rs 0', img: '', desc: '' });
  editProduct(adminItems.length - 1);
}

function deleteProduct(i) {
  if(confirm('Really delete this product?')) {
    adminItems.splice(i, 1);
    document.getElementById('adminContent').innerHTML = renderProductsTab();
  }
}

function handleImageFile(input, idx) {
  const file = input.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = e => {
      adminItems[idx].img = e.target.result;
      document.getElementById('imgPreview').src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
}

function closeModal() {
  document.getElementById('productModal').classList.remove('active');
}

/* ── WEBSITE TAB ── */
function renderWebsiteTab() {
  return `
    <div class="a-section">
      <div class="a-section-title">🌐 Website Settings</div>
      <div class="a-field">
        <label class="a-label">Brand Name</label>
        <input class="a-input" value="${adminCfg.brandName}" oninput="adminCfg.brandName=this.value"/>
      </div>
      <div class="a-field">
        <label class="a-label">Tagline</label>
        <input class="a-input" value="${adminCfg.tagline}" oninput="adminCfg.tagline=this.value"/>
      </div>
      <div class="a-field">
        <label class="a-label">WhatsApp Number</label>
        <input class="a-input" value="${adminCfg.whatsappNumber}" oninput="adminCfg.whatsappNumber=this.value" placeholder="923334445566"/>
      </div>
      <div class="a-field" style="margin-top:20px">
        <label class="a-label">Hero Title (Line 1)</label>
        <input class="a-input" value="${adminCfg.heroTitle1}" oninput="adminCfg.heroTitle1=this.value"/>
      </div>
      <div class="a-field">
        <label class="a-label">Hero Title (Line 2)</label>
        <input class="a-input" value="${adminCfg.heroTitle2}" oninput="adminCfg.heroTitle2=this.value"/>
      </div>
      <div class="a-field">
        <label class="a-label">Hero Subtitle</label>
        <textarea class="a-input" style="min-height:80px" oninput="adminCfg.heroSub=this.value">${adminCfg.heroSub}</textarea>
      </div>
      <div style="margin-top:16px">
        <label class="a-label">Trust Pills (One per line)</label>
        <textarea class="a-input" style="min-height:100px" id="pillsArea">${adminCfg.trustPills.join('\n')}</textarea>
        <button class="a-btn" style="margin-top:8px;background:#ddd" onclick="addTrustPill()">➕ Add Pill</button>
      </div>
      <div class="a-save-bar">
        <button class="a-btn a-btn-primary" onclick="adminSaveWebsite()">✅ Save Karo</button>
        <span class="a-success-msg" id="websiteMsg">✔ Saved!</span>
        <span class="a-success-msg" id="pillsMsg">✔ Pills updated!</span>
      </div>
    </div>`;
}

function addTrustPill() {
  adminCfg.trustPills.push('New Pill');
  document.getElementById('adminContent').innerHTML = renderWebsiteTab();
}

function adminSaveWebsite() {
  CONFIG.brandName = adminCfg.brandName;
  CONFIG.tagline = adminCfg.tagline;
  CONFIG.whatsappNumber = adminCfg.whatsappNumber;
  CONFIG.heroTitle1 = adminCfg.heroTitle1;
  CONFIG.heroTitle2 = adminCfg.heroTitle2;
  CONFIG.heroSub = adminCfg.heroSub;
  const pillsText = document.getElementById('pillsArea').value;
  CONFIG.trustPills = pillsText.split('\n').filter(p => p.trim());
  adminCfg.trustPills = CONFIG.trustPills;
  const msg = document.getElementById('websiteMsg');
  if(msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500); }
}

/* ── SOCIAL LINKS TAB ── */
function renderSocialTab() {
  return `
    <div class="a-section">
      <div class="a-section-title">📱 Social Media Links</div>
      <div class="a-grid-2" style="gap:14px">
        ${[['instagram','📷 Instagram URL'],['facebook','📘 Facebook URL'],['tiktok','🎵 TikTok URL']].map(([key,lbl]) => `
          <div class="a-field">
            <label class="a-label">${lbl}</label>
            <input class="a-input" value="${(adminCfg[key]||'').replace(/"/g,'&quot;')}" oninput="adminCfg['${key}']=this.value" placeholder="https://..."/>
          </div>`).join('')}
      </div>
      <div class="a-save-bar">
        <button class="a-btn a-btn-primary" onclick="adminSaveSocial()">✅ Save Karo</button>
        <span class="a-success-msg" id="socialMsg">✔ Saved!</span>
      </div>
    </div>`;
}

function adminSaveSocial() {
  ['instagram','facebook','tiktok'].forEach(k => { CONFIG[k] = adminCfg[k]; });
  const msg = document.getElementById('socialMsg');
  if(msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500); }
}

/* ── HERO SECTION TAB ── */
function renderHeroTab() {
  return `
    <div class="a-section">
      <div class="a-section-title">🎥 Hero Banner Image / Logo</div>
      <p style="font-size:12px;color:#888;margin-bottom:14px">Gallery se image upload karo jo hero section pe dikhani hai. Ya URL paste karo.</p>
      <div class="a-field">
        <label class="a-label">Brand Logo / Banner Image URL ya Upload</label>
        <div class="img-upload-row">
          <input class="a-input" id="cfg_heroBanner" value="${(adminCfg.heroBanner||'').replace(/"/g,'&quot;')}" oninput="adminCfg.heroBanner=this.value;document.getElementById('prev_heroBanner').src=this.value" placeholder="URL ya gallery se upload karo"/>
          <button class="img-upload-btn" onclick="document.getElementById('heroBannerFile').click()">📷 Gallery</button>
          <input type="file" id="heroBannerFile" accept="image/*" style="display:none" onchange="handleHeroBannerFile(this,'heroBanner')"/>
        </div>
        ${adminCfg.heroBanner?`<img id="prev_heroBanner" src="${adminCfg.heroBanner}" style="margin-top:8px;max-height:100px;border-radius:8px;border:1px solid rgba(139,26,74,0.15)" onerror="this.style.display='none'"/>`:`<img id="prev_heroBanner" style="display:none;margin-top:8px;max-height:100px;border-radius:8px"/>`}
      </div>
      <div class="a-save-bar">
        <button class="a-btn a-btn-primary" onclick="adminSaveHero()">✅ Save Karo</button>
        <span class="a-success-msg" id="heroMsg">✔ Saved!</span>
      </div>
    </div>
    <div class="a-section">
      <div class="a-section-title">📊 Stats Banner Numbers</div>
      <div class="a-grid-2" style="gap:12px" id="statsEditor">
        ${[['stat1n','stat1l','10,000+','Happy Customers'],['stat2n','stat2l','500+','Products'],['stat3n','stat3l','4.9★','Average Rating'],['stat4n','stat4l','Same Day','WhatsApp Reply']].map(([nk,lk,nd,ld]) => `
          <div style="display:flex;gap:8px;align-items:center;background:rgba(139,26,74,0.03);padding:10px;border-radius:8px">
            <input class="a-input sm" value="${adminCfg[nk]||nd}" oninput="adminCfg['${nk}']=this.value" placeholder="Number" style="width:80px"/>
            <input class="a-input sm" value="${adminCfg[lk]||ld}" oninput="adminCfg['${lk}']=this.value" placeholder="Label" style="flex:1"/>
          </div>`).join('')}
      </div>
      <div class="a-save-bar">
        <button class="a-btn a-btn-primary" onclick="adminSaveStats()">✅ Stats Save Karo</button>
        <span class="a-success-msg" id="statsMsg">✔ Saved!</span>
      </div>
    </div>`;
}

function handleHeroBannerFile(input, key) {
  const file = input.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = e => {
      adminCfg[key] = e.target.result;
      document.getElementById('cfg_' + key).value = e.target.result;
      document.getElementById('prev_' + key).src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
}

function adminSaveHero() {
  CONFIG.heroBanner = adminCfg.heroBanner;
  const msg = document.getElementById('heroMsg');
  if(msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500); }
}

function adminSaveStats() {
  const pairs = [['stat1n','stat1l'],['stat2n','stat2l'],['stat3n','stat3l'],['stat4n','stat4l']];
  pairs.forEach(([nk,lk]) => {
    CONFIG[nk] = adminCfg[nk];
    CONFIG[lk] = adminCfg[lk];
  });
  const msg = document.getElementById('statsMsg');
  if(msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500); }
}

/* ── SECURITY TAB ── */
function renderSecurityTab() {
  return `
    <div class="a-section">
      <div class="a-section-title">🔐 Password Change</div>
      <div style="max-width:360px">
        <div class="a-field" style="margin-bottom:12px">
          <label class="a-label">Naya Password</label>
          <input type="password" id="newPw1" class="a-input" placeholder="Naya password"/>
        </div>
        <div class="a-field" style="margin-bottom:12px">
          <label class="a-label">Naya Password Confirm</label>
          <input type="password" id="newPw2" class="a-input" placeholder="Dobara likho"/>
        </div>
        <div id="pwChangeErr" style="color:#e53e3e;font-size:12px;margin-bottom:8px;display:none"></div>
        <button class="a-btn a-btn-primary" onclick="adminChangePw()">🔐 Password Badlo</button>
        <span class="a-success-msg" id="pwMsg" style="margin-left:12px">✔ Password badal gaya!</span>
      </div>
    </div>
    <div class="a-section">
      <div class="a-section-title">🚪 Session</div>
      <p style="font-size:13px;color:#666;margin-bottom:14px">Admin session se bahar nikaalne ke liye logout karein.</p>
      <button class="a-btn a-btn-danger" onclick="adminLogout()">🚪 Logout</button>
    </div>`;
}

function adminChangePw() {
  const p1 = document.getElementById('newPw1').value;
  const p2 = document.getElementById('newPw2').value;
  const err = document.getElementById('pwChangeErr');
  if(!p1) { err.textContent = 'Password khali nahi ho sakta'; err.style.display = 'block'; return; }
  if(p1 !== p2) { err.textContent = 'Dono passwords match nahi karte'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  CONFIG.adminPassword = p1;
  const msg = document.getElementById('pwMsg');
  if(msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500); }
}

function adminLogout() {
  adminAuthed = false;
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginPw').value = '';
}

/* ── SAVE ALL PRODUCTS ── */
function adminSaveAll() {
  PRODUCTS = adminItems.map(p => ({...p}));
  closeModal();
  switchTab('products');
}
</script>
</body>
</html>
